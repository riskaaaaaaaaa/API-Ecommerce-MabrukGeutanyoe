<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Chat - Hijab Store</title>
    <!-- Bootstrap 5 CSS + Icons + Font -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar {
            display: none;
        }
        
        
        * {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f4f7fc;
            overflow-x: auto;
            height: 100vh;
            margin: 0;
            padding: 1rem;
        }
        /* Container lebih lebar untuk laptop/desktop - SAMA dengan halaman lain */
        .chat-wrapper {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            height: calc(100vh - 2rem);
            border-radius: 1.25rem;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03), 0 2px 6px rgba(0, 0, 0, 0.05);
            background: white;
        }
        /* Sidebar daftar user */
        .user-sidebar {
            background: #F8FAFC;
            border-right: 1px solid #eef2f8;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 1.25rem;
            background: white;
            border-bottom: 1px solid #eef2f8;
        }
        .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        .user-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1.25rem;
            border-bottom: 1px solid #eef2f8;
            cursor: pointer;
            transition: all 0.2s;
            background: #F8FAFC;
        }
        .user-item:hover {
            background: #f1f5f9;
        }
        .user-item.active {
            background: #E8F5F2;
            border-left: 4px solid #3A7B70;
        }
        .user-avatar {
            width: 44px;
            height: 44px;
            background: #E8F5F2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #3A7B70;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .user-info {
            flex: 1;
            min-width: 0;
        }
        .user-name {
            font-weight: 600;
            color: #2C3E3B;
            font-size: 0.9rem;
        }
        .user-email {
            font-size: 0.7rem;
            color: #6B7C7A;
            margin-top: 0.15rem;
        }
        .last-message {
            font-size: 0.7rem;
            color: #9bb5b0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 0.25rem;
        }
        /* Area chat */
        .chat-area {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: white;
        }
        .chat-header {
            padding: 1rem 1.5rem;
            background: white;
            border-bottom: 1px solid #eef2f8;
        }
        .messages-list {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background: white;
        }
        .message-bubble {
            max-width: 75%;
            display: flex;
            flex-direction: column;
        }
        .message-bubble.user {
            align-self: flex-start;
        }
        .message-bubble.admin {
            align-self: flex-end;
        }
        .bubble {
            padding: 0.6rem 1rem;
            border-radius: 1.25rem;
            font-size: 0.85rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user .bubble {
            background: #F1F5F9;
            color: #2C3E3B;
            border-bottom-left-radius: 0.25rem;
        }
        .admin .bubble {
            background: #3A7B70;
            color: white;
            border-bottom-right-radius: 0.25rem;
        }
        .message-time {
            font-size: 0.65rem;
            color: #9bb5b0;
            margin-top: 0.25rem;
            margin-left: 0.5rem;
            margin-right: 0.5rem;
        }
        .input-area {
            padding: 1rem 1.5rem;
            background: white;
            border-top: 1px solid #eef2f8;
        }
        /* Form input - SAMA dengan halaman lain */
        .form-control-custom {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 2rem;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: white;
        }
        .form-control-custom:focus {
            outline: none;
            border-color: #3A7B70;
            box-shadow: 0 0 0 3px rgba(58, 123, 112, 0.1);
        }
        .btn-send {
            background: #3A7B70;
            border: none;
            border-radius: 2rem;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .btn-send:hover {
            background: #2c5e55;
            transform: translateY(-1px);
        }
        /* Button back - SAMA dengan halaman lain */
        .btn-back-custom {
            background: rgba(58, 123, 112, 0.12);
            border: none;
            color: #3A7B70;
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            font-weight: 500;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
        }
        .btn-back-custom:hover {
            background: rgba(58, 123, 112, 0.25);
            color: #2c5e55;
            transform: translateY(-1px);
        }
        /* Empty state & loading */
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #9bb5b0;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #9bb5b0;
        }
        /* Avatar di chat header */
        .chat-header-avatar {
            width: 44px;
            height: 44px;
            background: #E8F5F2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #3A7B70;
            font-size: 1.1rem;
        }
        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 0.5rem;
            }
            .chat-wrapper {
                height: calc(100vh - 1rem);
            }
            .message-bubble {
                max-width: 85%;
            }
            .sidebar-header {
                padding: 0.75rem;
            }
            .chat-header {
                padding: 0.75rem 1rem;
            }
            .messages-list {
                padding: 1rem;
            }
            .input-area {
                padding: 0.75rem 1rem;
            }
            .user-item {
                padding: 0.6rem 1rem;
            }
            .user-avatar {
                width: 36px;
                height: 36px;
                font-size: 0.9rem;
            }
        }
        @media (min-width: 1200px) {
            .chat-wrapper {
                max-width: 1600px;
            }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="chatDashboard" style="display: none;">
        <div class="chat-wrapper">
            <div class="row g-0 h-100">
                <!-- Sidebar user list -->
                <div class="col-md-4 col-lg-3 h-100">
                    <div class="user-sidebar">
                        <div class="sidebar-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                            <h3 class="fs-5 fw-semibold mb-0 d-flex align-items-center gap-2" style="color: #2C3E3B;">
                                <i class="bi bi-chat-dots-fill" style="color: #3A7B70;"></i> Percakapan
                            </h3>
                            <a href="index.html" id="backToHomeBtn" class="btn-back-custom">
                                <i class="bi bi-arrow-left-circle"></i> Kembali
                            </a>
                        </div>
                        <div class="user-list" id="userList">
                            <div class="loading">Memuat daftar pengguna...</div>
                        </div>
                    </div>
                </div>

                <!-- Area chat -->
                <div class="col-md-8 col-lg-9 h-100">
                    <div class="chat-area">
                        <div class="chat-header d-flex align-items-center gap-3">
                            <div class="chat-header-avatar" id="selectedAvatar">👤</div>
                            <div>
                                <div class="user-name fw-semibold" id="selectedUserName" style="color: #2C3E3B;">Pilih percakapan</div>
                                <div class="small text-muted">Admin Support</div>
                            </div>
                        </div>
                        <div class="messages-list" id="messagesList">
                            <div class="empty-state">✨ Pilih pelanggan untuk melihat pesan</div>
                        </div>
                        <div class="input-area" id="inputArea" style="display: none;">
                            <div class="d-flex gap-2">
                                <input type="text" id="messageInput" class="form-control-custom" placeholder="Ketik pesan balasan..." autocomplete="off">
                                <button class="btn-send" id="sendBtn">
                                    <i class="bi bi-send-fill text-white"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ================= LOGIKA ASLI TIDAK BERUBAH =================
    if (typeof BASE_API === 'undefined') {
        console.warn("config.js tidak ditemukan, gunakan base url relatif '/'");
        var BASE_API = '';
    }

    let currentUser = null;
    let messagesRefreshInterval = null;

    async function fetchAPI(endpoint, options = {}) {
        const url = `${BASE_API}${endpoint}`;
        const response = await fetch(url, {
            ...options,
            credentials: 'include',
            headers: { 'Content-Type': 'application/json', ...options.headers }
        });
        if (!response.ok) {
            let errorMsg = `Request gagal (${response.status})`;
            try {
                const errData = await response.json();
                errorMsg = errData.message || errorMsg;
            } catch(e) {}
            throw new Error(errorMsg);
        }
        return response.json();
    }

    async function autoLoginAdmin() {
        try {
            const defaultEmail = "admin@rabbani.com";
            const defaultPassword = "admin123";
            const res = await fetch(`${BASE_API}/api/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ email: defaultEmail, password: defaultPassword })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Auto login gagal');
            console.log("Auto login admin sukses (chat)");
            return true;
        } catch (err) {
            console.error("Auto login error:", err);
            const container = document.getElementById('userList');
            if (container) {
                container.innerHTML = `<div class="alert alert-danger m-3" style="border-radius: 1rem;">Gagal auto login: ${err.message}</div>`;
            }
            return false;
        }
    }

    async function loadUsers() {
        const userListDiv = document.getElementById('userList');
        if (!userListDiv) return;
        try {
            const users = await fetchAPI('/api/admin/chats/users');
            if (!users.length) {
                userListDiv.innerHTML = '<div class="loading">Belum ada percakapan dengan pelanggan</div>';
                return;
            }
            let html = '';
            for (const u of users) {
                const initial = u.name ? u.name.charAt(0).toUpperCase() : u.email.charAt(0).toUpperCase();
                const lastMsg = u.lastMessage ? u.lastMessage.substring(0, 40) : '';
                html += `
                    <div class="user-item" data-email="${escapeHtml(u.email)}" data-name="${escapeHtml(u.name)}">
                        <div class="user-avatar">${escapeHtml(initial)}</div>
                        <div class="user-info">
                            <div class="user-name">${escapeHtml(u.name)}</div>
                            <div class="user-email">${escapeHtml(u.email)}</div>
                            <div class="last-message">${escapeHtml(lastMsg)}</div>
                        </div>
                    </div>
                `;
            }
            userListDiv.innerHTML = html;
            document.querySelectorAll('.user-item').forEach(el => {
                el.addEventListener('click', () => {
                    const email = el.dataset.email;
                    const name = el.dataset.name;
                    selectUser(email, name);
                });
            });
            if (currentUser) {
                highlightActiveUser(currentUser.email);
            }
        } catch (err) {
            console.error(err);
            userListDiv.innerHTML = `<div class="loading text-danger">Gagal memuat: ${err.message}</div>`;
        }
    }

    function highlightActiveUser(email) {
        document.querySelectorAll('.user-item').forEach(el => {
            if (el.dataset.email === email) {
                el.classList.add('active');
            } else {
                el.classList.remove('active');
            }
        });
    }

    async function selectUser(email, name) {
        if (currentUser && currentUser.email === email) return;
        currentUser = { email, name };
        document.getElementById('selectedUserName').innerText = name || email.split('@')[0];
        document.getElementById('selectedAvatar').innerText = (name ? name.charAt(0) : email.charAt(0)).toUpperCase();
        document.getElementById('inputArea').style.display = 'block';
        highlightActiveUser(email);
        await loadMessages(email);
        if (messagesRefreshInterval) clearInterval(messagesRefreshInterval);
        messagesRefreshInterval = setInterval(() => {
            if (currentUser && currentUser.email === email) {
                loadMessages(email, true);
            }
        }, 3000);
    }

    async function loadMessages(userEmail, silent = false) {
        const messagesDiv = document.getElementById('messagesList');
        if (!messagesDiv) return;
        if (!silent) messagesDiv.innerHTML = '<div class="loading">Memuat pesan...</div>';
        try {
            const messages = await fetchAPI(`/api/admin/chats/messages/${encodeURIComponent(userEmail)}`);
            if (!messages.length) {
                messagesDiv.innerHTML = '<div class="empty-state">Belum ada pesan. Kirim pesan pertama!</div>';
                return;
            }
            let html = '';
            for (const msg of messages) {
                const isUser = msg.isUser;
                const bubbleClass = isUser ? 'user' : 'admin';
                const timeStr = formatTime(new Date(msg.time));
                html += `
                    <div class="message-bubble ${bubbleClass}">
                        <div class="bubble">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${timeStr}</div>
                    </div>
                `;
            }
            messagesDiv.innerHTML = html;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        } catch (err) {
            if (!silent) messagesDiv.innerHTML = `<div class="empty-state text-danger">Error: ${err.message}</div>`;
        }
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        if (!message || !currentUser) {
            if (!currentUser) alert('Pilih pengguna terlebih dahulu');
            return;
        }

        const sendBtn = document.getElementById('sendBtn');
        const originalContent = sendBtn.innerHTML;
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<span class="spinner-border spinner-border-sm text-white"></span>';

        try {
            await fetchAPI('/api/admin/chats/send', {
                method: 'POST',
                body: JSON.stringify({ userEmail: currentUser.email, message })
            });
            input.value = '';

            const messagesDiv = document.getElementById('messagesList');
            const timeStr = formatTime(new Date());
            const msgHtml = `
                <div class="message-bubble admin">
                    <div class="bubble">${escapeHtml(message)}</div>
                    <div class="message-time">${timeStr}</div>
                </div>
            `;
            messagesDiv.insertAdjacentHTML('beforeend', msgHtml);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            loadUsers();
        } catch (err) {
            alert('Gagal mengirim pesan: ' + err.message);
            console.error(err);
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerHTML = originalContent;
        }
    }

    function formatTime(date) {
        const hours = date.getHours().toString().padStart(2, '0');
        const minutes = date.getMinutes().toString().padStart(2, '0');
        return `${hours}:${minutes}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function initChatApp() {
        document.getElementById('chatDashboard').style.display = 'block';
        await loadUsers();
        const sendBtn = document.getElementById('sendBtn');
        const msgInput = document.getElementById('messageInput');
        if (sendBtn) sendBtn.addEventListener('click', sendMessage);
        if (msgInput) msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    }

    window.onload = async () => {
        const loginSuccess = await autoLoginAdmin();
        if (loginSuccess) {
            await initChatApp();
        } else {
            document.getElementById('chatDashboard').style.display = 'block';
            const userListDiv = document.getElementById('userList');
            if (userListDiv) {
                userListDiv.innerHTML = `<div class="alert alert-danger m-3" style="border-radius: 1rem;">Gagal login otomatis. Periksa koneksi backend atau kredensial admin.</div>`;
            }
            const messagesDiv = document.getElementById('messagesList');
            if (messagesDiv) messagesDiv.innerHTML = '<div class="empty-state">Tidak dapat terhubung ke server chat.</div>';
        }
    };
</script>
</body>
</html>
